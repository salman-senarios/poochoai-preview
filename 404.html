<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — Poocho AI</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="logo-light.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="legal.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .err-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 32px;
            position: relative;
            overflow: hidden;
        }
        .err-wrap::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(205, 220, 57, 0.1) 0%, transparent 60%);
            filter: blur(80px);
            pointer-events: none;
        }
        .err-card {
            text-align: center;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }
        .err-code {
            font-family: var(--font-display);
            font-size: clamp(96px, 18vw, 180px);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, var(--accent) 0%, rgba(205, 220, 57, 0.4) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }
        .err-title {
            font-family: var(--font-display);
            font-size: clamp(24px, 3vw, 32px);
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 14px;
        }
        .err-message {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .err-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .err-btn {
            padding: 12px 22px;
            border-radius: var(--r-md);
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .err-btn.primary {
            background: var(--accent);
            color: #0A0A0F;
            box-shadow: 0 12px 32px rgba(205, 220, 57, 0.18);
        }
        .err-btn.primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        .err-btn.ghost {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border-strong);
        }
        .err-btn.ghost:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <nav class="page-nav">
        <div class="page-nav-inner">
            <a href="index.html" class="home" aria-label="Poocho AI home"><img src="logo-light.svg" alt="Poocho AI"></a>
            <a href="index.html" class="back">← Back to home</a>
        </div>
    </nav>

    <main class="err-wrap">
        <div class="err-card">
            <div class="err-code">404</div>
            <h1 class="err-title">This page went off-script.</h1>
            <p class="err-message">The page you're looking for doesn't exist, was moved, or never made it past the draft folder. Our AI agents are still good — we promise.</p>
            <div class="err-actions">
                <a href="index.html" class="err-btn primary">Go home</a>
                <a href="mailto:hello@poochoai.com" class="err-btn ghost">Contact support</a>
            </div>
        </div>
    </main>

    <footer class="page-footer">
        <a href="privacy.html">Privacy</a> <a href="terms.html">Terms</a> <a href="cookies.html">Cookies</a> <a href="security.html">Security</a>
        <div style="margin-top: 12px;">© <span id="copyright-year">2026</span> Poocho AI. All rights reserved.</div>
    </footer>
<script>(function(){var e=document.getElementById("copyright-year");if(e)e.textContent=new Date().getFullYear()})();</script></body>
</html>
